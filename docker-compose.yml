services:
  postgres:
    image: postgres:14-alpine
    container_name: kanban_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: kanbancore
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kanban_cache
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban_backend
    restart: unless-stopped
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://admin:adminpassword@postgres:5432/kanbancore
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "3333:3333"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:3333
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pg_data:
  redis_data: